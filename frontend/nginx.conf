server {
  listen 80;

  # "backend" resolves via Docker Compose's internal network to the
  # backend service - see docker-compose.yml.
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_set_header Host $host;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
