services:
  backend:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_uploads:
